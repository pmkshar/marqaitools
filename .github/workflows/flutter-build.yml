name: Flutter Build (Android APK)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:

# Cancel any superseded run on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.19
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable
          cache: true

      - name: Print Flutter version
        working-directory: mobile
        run: flutter --version

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Run analyzer
        working-directory: mobile
        run: flutter analyze

      - name: Build APK (release)
        working-directory: mobile
        run: flutter build apk --release

      - name: Locate built APK
        id: locate
        run: |
          apk=$(find mobile/build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
          echo "apk_path=$apk" >> "$GITHUB_OUTPUT"
          ls -lh "$apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marqai-android-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0   # APK is already compressed

      - name: Build App Bundle (release)
        working-directory: mobile
        run: flutter build appbundle --release
        continue-on-error: true

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marqai-android-aab
          path: mobile/build/app/outputs/bundle/release/*.aab
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0
